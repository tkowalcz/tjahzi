version: 2.1

orbs:
  circleci-maven-release-orb: sonatype-nexus-community/circleci-maven-release-orb@0.0.16

jobs:
  build-and-test:
    machine:
      image: ubuntu-2204:2024.11.1
    steps:
      - run:
          name: Install OpenJDK 11
          command: |
            sudo apt-get update && sudo apt-get install openjdk-11-jdk
            sudo update-alternatives --set java /usr/lib/jvm/java-11-openjdk-amd64/bin/java
            sudo update-alternatives --set javac /usr/lib/jvm/java-11-openjdk-amd64/bin/javac
            java -version
      - checkout

      # Download and cache dependencies
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "pom.xml" }}
            # fallback to using the latest cache if no exact match is found
            - v1-dependencies-

      - run:
          name: Install module deps
          command: mvn package install -Dmaven.test.skip=true -ntp

      # Download maven dependencies so that we can cache them
      # ########################
      - run:
          name: Download Dependencies
          command: mvn dependency:go-offline

      - save_cache:
          paths:
            - ~/.m2
          key: v1-dependencies-{{ checksum "pom.xml" }}

      # Standard maven build and test phases
      # ########################
      - run:
          name: Verify
          command: mvn clean verify -ntp

      - run:
          name: Save test results
          command: |
            mkdir -p ~/test-results/junit/
            find . -type f -regex ".*/target/surefire-reports/.*xml" -exec cp {} ~/test-results/junit/ \;
          when: always

      - store_test_results:
          path: ~/test-results

  native-image-test:
    machine:
      image: ubuntu-2204:2024.11.1
    steps:
      - checkout
      - run:
          name: Install GraalVM
          command: |
            curl -sL https://github.com/graalvm/graalvm-ce-builds/releases/download/jdk-21.0.2/graalvm-community-jdk-21.0.2_linux-x64_bin.tar.gz | tar xz -C $HOME
            echo "export JAVA_HOME=$HOME/graalvm-community-openjdk-21.0.2+13.1" >> $BASH_ENV
            echo "export PATH=$HOME/graalvm-community-openjdk-21.0.2+13.1/bin:\$PATH" >> $BASH_ENV
      - run:
          name: Start Loki
          command: docker run -d --rm -p 3100:3100 grafana/loki:3.1.0
      - run:
          name: Install module deps
          command: mvn install -Dmaven.test.skip=true -ntp
      - run:
          name: Build native smoke test
          command: mvn -Pnative -pl native-image-test package -DskipTests -ntp
      - run:
          name: Run native smoke test
          command: ./native-image-test/target/native-smoke-test

executors:
  new-java-maven-executor:
    machine:
      image: ubuntu-2204:2024.11.1

parameters:
  run_workflow_release:
    default: false
    type: boolean

workflows:
  version: 2
  main:
    jobs:
      - build-and-test
      - native-image-test
  release:
    when: << pipeline.parameters.run_workflow_release >>
    jobs:
      - circleci-maven-release-orb/run-maven-release:
          executor: new-java-maven-executor
          mvn-release-prepare-command: >-
            mvn --batch-mode release:prepare -ntp -DskipTests -DscmCommentPrefix="[skip ci] [maven-release-plugin] "
          mvn-release-perform-command: >-
            mvn --batch-mode release:perform -ntp -DskipTests -s .circleci/.maven.xml
